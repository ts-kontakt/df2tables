<!DOCTYPE html>
<html>
<head>
    <!--[head-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DataFrame</title>
    <style>
        :root {
            --table-border: 1px solid rgba(34, 36, 38, 0.1);
            --border-color: #e9e9e9;
            --text-color-gray: gray;
            --button-color: #0A2540;
            --selected-bg: #e0f0ff;
            --selected-border: #66b2ff;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            font-size: 0.875rem;
            /* ≈14px */
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* DataTables Wrapper */
        .dataTables_wrapper {
            margin-top: 2rem;
        }

        /* Table Structure */
        table.dataTable {
            border: var(--table-border);
            margin: 0;
        }

        table.dataTable thead td {
            border-style: solid;
            border-color: var(--border-color);
            border-width: 0 1px 0 0;
            padding: 0 0 0 0.4rem !important;
        }

        table.dataTable td {
            border-left: var(--table-border);
            font-size: 13px;
            max-width: 20rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        table.dataTable td span {
            float: right;
        }

        td.dt-nowrap {
            white-space: nowrap;
        }

        /* Header Styling */
        span.dt-column-title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.1;
            white-space: wrap;
        }

        /* Input Styling */
        .dt-input {
            border-radius: 6px;
            transition: all 0.2s ease-in-out;
        }

        input.dt-input:not(:placeholder-shown) {
            background-color: var(--selected-bg) !important;
            border-color: var(--selected-border) !important;
            font-weight: bold;
        }

        input[type="search"]::-webkit-search-cancel-button {
            -webkit-appearance: auto;
            appearance: auto;
            cursor: pointer;
        }

        /* Info Section */
        .dt-info {
            padding: 0;
            font-size: 12px;
            color: var(--text-color-gray);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Layout */
        div.dt-container div.dt-layout-row {
            margin: 0.5em 0 0 0;
        }

        /* Buttons */
        div.dt-buttons {
            margin-right: 1rem;
        }

        button.dt-button {
            padding: 0.2rem 0.5rem !important;
        }

        .custom_btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 3px 4px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background: #f7f7f7;
            cursor: pointer;
        }

        .custom_btn:hover {
            background: #e9e9e9;
        }

        .custom_btn .icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Column Control */
        div.dtcc-title {
            font-weight: 600;
        }

        table.dataTable span.dtcc span.dtcc-button-icon {
            color: var(--button-color);
            --dt-row-selected-stripe-alpha: 0.99;
        }

        /* Logo */
        .dtlogo {
            position: absolute;
            top: 0;
            right: 0;
            width: auto;
            margin: 1em;
            opacity: 0.5;
            display: block;
            z-index: 2;
        }

        /* Custom Elements */
        custom.select {
            color: black;
            max-width: 15.5em;
            margin: 1px;
        }

        /* Allow the shadow pseudo-element to render outside the fixed cell */
        table.dataTable td.dtfc-fixed-start,
        table.dataTable th.dtfc-fixed-start,
        table.dataTable td.dtfc-fixed-left,
        table.dataTable th.dtfc-fixed-left {
            overflow: visible !important;
        }

        #tabcnt {
            width: fit-content;
            margin: 0 0 0 0.5rem;
        }

        #tabcnt:has(.dtfc-fixed-left),
        #tabcnt:has(.dtfc-fixed-right) {
            width: 100%;
            overflow-x: auto;
            /* ← needed, they omitted this too */
        }
    </style>
    <!--[scripts-->
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/3.2.6/css/buttons.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/colreorder/2.1.0/css/colReorder.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/columncontrol/1.1.0/css/columnControl.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/5.0.5/css/fixedColumns.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.4.3/css/scroller.dataTables.min.css">

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/3.2.6/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/3.2.6/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/3.2.6/js/buttons.colVis.min.js"></script>
    <script src="https://cdn.datatables.net/colreorder/2.1.0/js/dataTables.colReorder.min.js"></script>
    <script src="https://cdn.datatables.net/columncontrol/1.1.0/js/dataTables.columnControl.min.js"></script>
    <script src="https://cdn.datatables.net/fixedcolumns/5.0.5/js/dataTables.fixedColumns.min.js"></script>
    <script src="https://cdn.datatables.net/scroller/2.4.3/js/dataTables.scroller.min.js"></script>
    <!--scripts]-->
    <!--head]-->
</head>
<body>
    <div class="pure-g">
        <div class="pure-u-1 pure-u-md-1-1" style="padding:0px;">
            <div id="loading" style="display:none;">
                Loading…
            </div>
            <div id="tabcnt">
                <p><!--[title-->
                 <!--title]--></p><!--[table_markup-->
                <table id="pd_datatab" style="width:100%;" class="display compact hover order-column"></table><!--table_markup]-->
            </div>
        </div><!--[datatables_logo-->
        <figure class="dtlogo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Datatables_logo_square.png" width="20" style="display: block; margin-left: auto; margin-right: auto">
            <figcaption style="text-align: center">
                <small style="font-size: 9px"><a target="blank" href="https://datatables.net">DataTables.net</a></small>
            </figcaption>
        </figure><!--datatables_logo]-->
    </div><!--[min_content-->
    <script type="text/javascript">
        /* global DataTable, $, jQuery  */
        (function() {
            /* https://datatables.net/extensions/columncontrol/examples/styling/alignmentHeaderOnly.html */
            DataTable.type("num", "className", "dt-body-right");
            DataTable.type("num-fmt", "className", "dt-body-right");
            DataTable.type("date", "className", "dt-body-right");

            if (DataTable.ColumnControl) {
                const active_funnel = '<svg id="funnel_menu_a" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="-3 -3 30 30" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-funnel-icon lucide-funnel"> <rect x="-4" y="-4" width="32" height="32" fill="#0B57D0"/> <path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"/> </svg> ';
                const inactive_funnel = '<svg xmlns="http://www.w3.org/2000/svg" id="funnel_menu_p" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list-filter-icon lucide-list-filter"><path d="M2 5h20"/><path d="M6 12h12"/><path d="M9 19h6"/></svg>';

                DataTable.ColumnControl.icons["menu"] = inactive_funnel;
                DataTable.ColumnControl.Button.prototype._checkActive = function() {
                    var curr_icon = this._dom.icon.innerHTML || "";
                    if (this._s.active === true || Object.values(this._s.activeList).includes(true)) {
                        this._dom.state.innerHTML = DataTable.ColumnControl.icons.tick;
                        this._dom.button.classList.add("dtcc-button_active");
                        if (curr_icon.includes("funnel_menu")) {
                            this._dom.icon.innerHTML = active_funnel;
                        }
                    } else {
                        this._dom.state.innerHTML = "";
                        this._dom.button.classList.remove("dtcc-button_active");
                        if (curr_icon.includes("funnel_menu")) {
                            this._dom.icon.innerHTML = inactive_funnel;
                        }
                    }
                    return this;
                };
            }

            function deepMerge(target, source) {
                for (const key in source) {
                    if (source[key] && typeof source[key] === "object" && !Array.isArray(source[key])) {
                        if (!target[key] || typeof target[key] !== "object" || Array.isArray(target[key])) {
                            target[key] = {};
                        }
                        deepMerge(target[key], source[key]);
                    } else {
                        target[key] = source[key];
                    }
                }
                return target;
            }

            function _anyNumber(a) {
                var reg = /[+-]?((\d+(\.\d*)?)|\.\d+)([eE][+-]?[0-9]+)?/;
                if (typeof a === "string") {
                    a = a.replaceAll(",", ".").replace(/ /g, "").match(reg);
                    a = a !== null ? parseFloat(a[0]) : Number.POSITIVE_INFINITY;
                }
                return a;
            }

            jQuery.extend(jQuery.fn.dataTableExt.oSort, {
                "num-html-pre": function(a) {
                    var x = String(a).replace(/<[\s\S]*?>/g, "");
                    return parseFloat(_anyNumber(x));
                },
                "num-html-asc": function(a, b) {
                    return a < b ? -1 : a > b ? 1 : 0;
                },
                "num-html-desc": function(a, b) {
                    return a < b ? 1 : a > b ? -1 : 0;
                }
            });

            const add_expand_btn = /*[add_expand_btn*/ true /*add_expand_btn]*/ ;

            function search_info() {
                if (search_columns && search_columns.length > 0) {
                    const searchableColumns = search_columns;
                    let search_msg = "[" + searchableColumns.map(col => `'${col}'`).join(", ") + "]";
                    if (search_msg.length > 150) {
                        search_msg = search_msg.slice(0, 150) + "...";
                    }
                    const searchNote = $("<span>").css({
                        margin: "0.5rem",
                        "font-size": "0.7rem",
                        "font-style": "italic",
                        display: "inline-flex",
                        color: "#667"
                    }).text(search_msg);
                    $("#" + TABLE_ID + "_wrapper .dt-search input.dt-input").after(searchNote);
                }

                if (add_expand_btn) {
                    var dn_icon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5e5c64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down"><path d="m6 9 6 6 6-6"/></svg>';
                    var up_icon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5e5c64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-up"><path d="m18 15-6-6-6 6"/></svg>';
                    var expand_butt = '<button class="custom_btn" type="button" title="Show tools"><span class="icon">' + dn_icon + "</span></button>";
                    var tools = $("<span>").css({
                        display: "flex",
                        right: "",
                        "font-size": "11px"
                    }).html(expand_butt);

                    $("#" + TABLE_ID + "_info").before(tools);
                    $("#" + TABLE_ID + "_wrapper").find("div.dt-buttons").hide();
                    $("#" + TABLE_ID + "_wrapper").find("div.dt-length").hide();

                    tools.on("click", function(event) {
                        event.preventDefault();
                        $("#" + TABLE_ID + "_wrapper").find("div.dt-buttons").toggle();
                        $("#" + TABLE_ID + "_wrapper").find("div.dt-length").toggle();
                        var iconSpan = $(this).find(".icon");
                        var button = $(this).find(".custom_btn");
                        var isDown = iconSpan.html().indexOf("chevron-down") !== -1;
                        if (isDown) {
                            iconSpan.html(up_icon);
                            button.attr("title", "Hide tools");
                        } else {
                            iconSpan.html(dn_icon);
                            button.attr("title", "Show tools");
                        }
                    });
                }
            }

            const render_precision = /*[precision*/ 2 /*precision]*/ ;
            var thousands = "";
            var decimal = ".";

            const render_num = (data, type) => {
                if (data == null) {
                    return null;
                }
                const number = DataTable.render.number(thousands, decimal, render_precision).display(data);
                if (type !== "display") return data;
                const color = data < 0 ? "red" : "black";
                return '<span style="color:' + color + '">' + number + "</span>";
            };

            const tab_data =
                /*[tab_data*/
                [
                    ["2025-09-11T08:27:01.989794", .09, "F", -.987, -2e3, "Premium", 222222222.987, -1, "Emergency"],
                    ["Lorem ipsum dolor sit amet, consectetur adipiscing", -.59, "A", 1, -1, "Premium", "0.123", 1, "Medium priority"],
                    ["<b>Integer</b> laoreet odio et.", .2, "D", -9, 2, "Budget", "1", 2, "Low priority"],
                    [null, -.49, "F", 4, 3, "Budget", "0", 1, "Low priority"],
                    [" class 'datetime.datetime' ", -.18, "A", 2, 4, "Standard", "1", 1, "Emergency"],
                    [" NA ", -.8, "A", 3, 5, "Premium", "0", 0, "High priority"],
                    [
                        ["C", {
                            a: 1
                        }], -.52, "B", "1111.11", "7e4", "Budget", "0", 0, "High priority"
                    ]
                ]
            /*tab_data]*/
            ;

            const columns =
                /*[tab_columns*/
                [{
                    title: "col 1a",
                    searchable: true,
                    orderable: true,
                    columnControl: ["order", ["title", "search"]]
                }, {
                    title: "col 2",
                    searchable: true,
                    orderable: true,
                    columnControl: ["order", ["title", "search"]],
                    render: render_num,
                    type: "num-html"
                }, {
                    title: "C 3",
                    orderable: true,
                    columnControl: ["order", ["title", "searchList"]]
                }, {
                    title: "col4",
                    searchable: true,
                    orderable: true,
                    columnControl: ["order", ["title", "search"]],
                    render: render_num,
                    type: "num-html"
                }, {
                    title: "col5",
                    searchable: true,
                    orderable: true,
                    columnControl: ["order", ["title", "search"]],
                    render: render_num,
                    type: "num-html"
                }, {
                    title: "col6",
                    orderable: true,
                    columnControl: ["order", ["title", "searchList"]]
                }, {
                    title: "col7",
                    orderable: true,
                    columnControl: ["order", ["title", "searchList"]]
                }, {
                    title: "col8",
                    orderable: true,
                    columnControl: ["order", ["title", "searchList"]]
                }, {
                    title: "col9",
                    orderable: true,
                    columnControl: ["order", ["title", "searchList"]]
                }]
            /*tab_columns]*/
            ;

            const search_columns =
                /*[search_columns*/
                ["col_1a", "C 3", "col6", "col7", "col9"]
            /*search_columns]*/
            ;
            const search_val = search_columns && search_columns.length > 0 ? "search" : null;

            const custom_layout = {
                top1Start: "info",
                top2Start: search_val,
                topStart: ["pageLength", {
                    buttons: ["colvis", "copy"]
                }],
                topEnd: null,
                bottomStart: "paging",
                bottomEnd: null,
                bottom: null
            };

            const TABLE_ID = /*[table_id*/ "pd_datatab"
            /*table_id]*/
            ;
            const locale_fmt = /*[locale_fmt*/ false /*locale_fmt]*/ ;

            if (locale_fmt) {
                DataTable.type("date", "render", DataTable.render.date());
                DataTable.type("num", "render", DataTable.render.number());
            } else {
                DataTable.type("num", "render", DataTable.render.number(thousands, decimal, render_precision));
            }

            const clearButton = '<button id="custom_clear1" class="custom_btn"><span class="icon"><svg id="custom_clear2" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-funnel-x-icon lucide-funnel-x"><path d="M12.531 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14v6a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341l.427-.473"/><path d="m16.5 3.5 5 5"/><path d="m21.5 3.5-5 5"/></svg></span>Clear all</button>';

            let table_opts = {
                data: tab_data,
                layout: custom_layout,
                autoWidth: false,
                columns: columns,
                pageLength: 50,
                responsive: false,
                order: false,
                processing: true,
                language: {
                    search: "_INPUT_",
                    searchPlaceholder: "Search in columns:",
                    sInfoFiltered: "(filtered from _MAX_ total entries) " + clearButton
                },
                initComplete: search_info
            };

            const custom_config_opts = /*[js_opts*/ {} /*js_opts]*/ ;
            const _PAGING_WARN_LIMIT = /*[paging_warn_limit*/ 500 /*paging_warn_limit]*/ ;

            if (custom_config_opts && Object.keys(custom_config_opts).length > 0) {
                deepMerge(table_opts, custom_config_opts);

                // Adjust layout wrapper if FixedColumns is active
                if (custom_config_opts.fixedColumns) {
                    $("#" + TABLE_ID).parent().css({
                        "width": "100%",
                        "max-width": "100%",
                        "overflow-x": "auto"
                    });
                }

                // Warn before building table when paging is disabled on large datasets
                if (table_opts.paging === false && tab_data.length > _PAGING_WARN_LIMIT) {
                    const warn = document.createElement("div");
                    warn.innerHTML =
                        "<strong>⚠ Performance warning</strong> — " +
                        "<strong>" + tab_data.length.toLocaleString() + "</strong> rows loaded into the DOM at once. " +
                        "Sorting, filtering and scrolling will all be slower. " +
                        "<br><em>Tip: drop <code>paging: false</code> and set " +
                        "<code>pageLength: 1000</code> instead — only 1000 rows in the DOM at a time, " +
                        "full data still searchable.</em> " +
                        "<button onclick=\"this.parentNode.remove()\" " +
                        "style=\"float:right;border:none;background:none;cursor:pointer;font-size:1rem\">&#x2715;</button>";
                    warn.style.cssText = "background:#fff3cd;border:1px solid #ffc107;border-left:4px solid #e6a817;color:#664d03;font-size:.875rem;margin-bottom:.5rem;padding:.5rem .75rem;position:relative";
                    document.getElementById("tabcnt").insertAdjacentElement("beforebegin", warn);
                }
            }

            const build_table = function() {
                let table = $("#" + TABLE_ID).DataTable(table_opts);
                $(document).on("click", "#custom_clear1", e => {
                    e.preventDefault();
                    try {
                        table.search("").columns().columnControl.searchClear().draw();
                    } catch (err) {
                        console.log(err);
                        table.search("").draw();
                    }
                });
            };

            $(document).ready(function() {
                build_table();
            });
        })();
    </script>
    <!--min_content]-->
</body>
</html>
